<section id="work" class="py-24 px-6 border-t border-rule scroll-mt-20">
  <div class="max-w-6xl mx-auto">

    <div class="mb-12">
      <span class="text-[10px] font-body uppercase tracking-[0.35em] text-ash">Work</span>
    </div>

    <!-- hairline-bordered grid: gap-px on rule-colored container, cells get bg-paper -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-px bg-rule">
      {% for project in site.data.projects %}
      <article class="bg-paper p-8 md:p-10 hover:bg-smoke transition-colors duration-300 flex flex-col">

        <div class="mb-8 h-9 flex items-center">
          <img
            src="/assets/{{ project.logo }}"
            alt="{{ project.name }}"
            class="h-full w-auto max-w-[140px] object-contain object-left grayscale"
          >
        </div>

        <p class="font-body text-[14px] text-ash leading-relaxed flex-1">
          {{ project.description }}
        </p>

        {% if project.url %}
        <a
          href="{{ project.url }}"
          target="_blank"
          rel="noopener noreferrer"
          class="mt-7 self-start text-[11px] font-body uppercase tracking-[0.2em] text-ink border-b border-ink pb-px hover:text-ash hover:border-ash transition-colors duration-200"
        >
          Visit ↗
        </a>
        {% endif %}

      </article>
      {% endfor %}
    </div>

  </div>
</section>

<footer class="py-12 px-6 border-t border-rule">
  <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
    <span class="font-display italic text-xl text-ink">Enkhjargal Lkhagvaa</span>
    <span class="text-[11px] font-body text-ash tracking-[0.2em]">© 2026</span>
  </div>
</footer>
