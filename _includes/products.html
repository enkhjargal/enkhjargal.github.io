<section id="products" class="py-24 px-6 border-t border-rule bg-smoke scroll-mt-20">
  <div class="max-w-6xl mx-auto">

    <div class="reveal mb-12">
      <span class="font-mono text-[10px] uppercase tracking-[0.35em] text-ash">Products</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-px bg-rule">
      {% for product in site.data.products %}
      <article class="bg-paper p-8 md:p-10 flex flex-col reveal reveal-delay-{{ forloop.index }}">

        <!-- Logo + category -->
        <div class="flex items-start justify-between gap-4 mb-7">
          <div class="h-9 flex items-center">
            <img
              src="/assets/{{ product.logo }}"
              alt="{{ product.name }}"
              class="h-full w-auto max-w-[130px] object-contain object-left rounded-md shadow-sm"
            >
          </div>
          <span class="font-mono text-[10px] uppercase tracking-wider text-ash text-right leading-tight">{{ product.category }}</span>
        </div>

        <!-- Tagline -->
        <p class="font-display italic text-ink text-xl leading-snug mb-3">{{ product.tagline }}</p>

        <!-- Description -->
        <p class="font-body text-[14px] text-ash leading-relaxed flex-1 mb-6">{{ product.description }}</p>

        <!-- Stack -->
        {% if product.stack %}
        <div class="flex flex-wrap gap-1.5 mb-6">
          {% for tech in product.stack %}
          <span class="font-mono text-[10px] text-ash border border-rule px-2 py-0.5">{{ tech }}</span>
          {% endfor %}
        </div>
        {% endif %}

        {% if product.url and product.url != "#" %}
        <a href="{{ product.url }}" target="_blank" rel="noopener noreferrer"
           class="self-start font-mono text-[11px] uppercase tracking-[0.2em] text-ink border-b border-ink pb-px hover:text-ash hover:border-ash transition-colors duration-200">
          View Product ↗
        </a>
        {% endif %}

      </article>
      {% endfor %}
    </div>

  </div>
</section>
