<!-- ── Inverted dark contact section ── -->
<section id="contact" class="py-24 px-6 bg-ink text-paper scroll-mt-20">
  <div class="max-w-6xl mx-auto">

    <div class="reveal mb-12">
      <span class="font-mono text-[10px] uppercase tracking-[0.35em]" style="color:rgba(255,255,255,0.4)">Contact</span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-14 lg:gap-20">

      <!-- Left: Headline + links -->
      <div class="lg:col-span-7">
        <h2 class="font-display italic leading-[0.88] text-paper mb-10 reveal" style="font-size: clamp(2.5rem, 7vw, 5.5rem)">
          Let's work<br>together.
        </h2>

        <div class="space-y-5 reveal reveal-delay-1">
          <a href="mailto:hello@enkhjargal.dev"
             class="flex items-center gap-4 group">
            <span class="font-mono text-[10px] uppercase tracking-wider flex-shrink-0 w-20" style="color:rgba(255,255,255,0.35)">Email</span>
            <span class="font-body text-[15px] text-paper group-hover:underline">hello@enkhjargal.dev</span>
            <span class="opacity-0 group-hover:opacity-100 transition-opacity text-paper">↗</span>
          </a>

          {% for handle in site.data.handles %}
          <a href="{{ handle.link }}?utm_source=referrer&utm_medium=portfolio&utm_campaign=contact"
             target="_blank" rel="noopener noreferrer"
             class="flex items-center gap-4 group">
            <span class="font-mono text-[10px] uppercase tracking-wider flex-shrink-0 w-20" style="color:rgba(255,255,255,0.35)">{{ handle.name }}</span>
            <span class="font-body text-[15px]" style="color:rgba(255,255,255,0.7)">{{ handle.link | remove: "https://" }}</span>
            <span class="opacity-0 group-hover:opacity-100 transition-opacity" style="color:rgba(255,255,255,0.7)">↗</span>
          </a>
          {% endfor %}
        </div>

        <div class="mt-12 reveal reveal-delay-2">
          <a href="mailto:hello@enkhjargal.dev"
             class="inline-flex items-center gap-2 bg-paper text-ink font-body font-medium text-[14px] px-7 py-3.5 hover:bg-ash hover:text-paper transition-colors duration-200">
            Send a Message →
          </a>
        </div>
      </div>

      <!-- Right: QR code vCard -->
      <div class="lg:col-span-5 flex flex-col items-start lg:items-end reveal reveal-delay-3">
        <div class="p-5 bg-paper inline-block">
          <canvas id="vcard-qr"></canvas>
        </div>
        <p class="font-mono text-[10px] uppercase tracking-[0.25em] mt-4" style="color:rgba(255,255,255,0.35)">
          Scan to save contact
        </p>
        <p class="font-mono text-[11px] mt-1" style="color:rgba(255,255,255,0.25)">
          Opens in Contacts app
        </p>
      </div>

    </div>
  </div>
</section>

<!-- ── Footer ── -->
<footer class="py-8 px-6 bg-dim">
  <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
    <span class="font-display italic text-xl" style="color:rgba(255,255,255,0.85)">Enkhjargal Lkhagvaa</span>
    <span class="font-mono text-[10px] uppercase tracking-wider" style="color:rgba(255,255,255,0.3)">© 2026 · Built with Jekyll &amp; Tailwind CSS</span>
  </div>
</footer>

<script type="text/javascript" defer>
(function() {
  var vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Lkhagvaa;Enkhjargal;;;',
    'FN:Enkhjargal',
    'TITLE:Digital Marketing & Software Professional',
    'EMAIL;TYPE=INTERNET:hello@enkhjargal.dev',
    'URL:https://enkhjargal.dev',
    'SOURCE:https://enkhjargal.dev'
  ].join('\r\n') + '\r\nEND:VCARD';

  function tryGenQR() {
    var canvas = document.getElementById('vcard-qr');
    if (!canvas) return;
    if (typeof QRCode === 'undefined') { setTimeout(tryGenQR, 150); return; }
    QRCode.toCanvas(canvas, vcard, {
      width: 200,
      margin: 0,
      color: { dark: '#0A0A0A', light: '#FFFFFF' }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tryGenQR);
  } else {
    tryGenQR();
  }
})();
</script>
